name: Android CI

on: 
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches: 
      - master

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  #v4.3.1
      with:
        submodules: recursive
        persist-credentials: false

    - name: set up JDK 17
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  #v4.8.0
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Gradle Wrapper Validation
      uses: gradle/actions/wrapper-validation@748248ddd2a24f49513d8f472f81c3a07d4d50e1  #v4.4.4
    - name: Make gradlew executable
      run: chmod +x ./gradlew
    
    - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  #v4.3.0
      with:
        path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
            ${{ runner.os }}-gradle-
    
    - name: Build with Gradle
      run: ./gradlew assembleProductionDebug
    
    - name: Build with Gradle (Unit tests)
      run: ./gradlew testProductionRelease
    
    - name: Build with Gradle (lintVitalRelease)
      run: ./gradlew lintVitalProductionRelease
    
    - name: Upload artifacts (debug apk)
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  #v4.6.2
      with:
        name: app
        path: app/build/outputs/apk/production/release/app-production-release-unsigned.apk

    - name: Upload artifacts (lint results)
      if: success() || failure()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  #v4.6.2
      with:
        name: lint-results
        path: app/build/reports/lint-results-productionRelease-fatal.html

    - name: Upload artifacts (merge report)
      if: success() || failure()
      uses: actions/upload-artifact@v4
      with:
        name: manifest-merger-report
        path: app/build/outputs/logs/manifest-merger-production-release-report.html

    - name: Upload artifacts (test results)
      if: success() || failure()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  #v4.6.2
      with:
        name: test-results
        path: app/build/reports/tests/testProductionReleaseUnitTest/

