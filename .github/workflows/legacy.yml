name: Android CI (legacy)

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup gradle.properties (legacy)
      run: |
        echo "org.gradle.jvmargs=-Xmx2048m" > gradle.properties
        echo "android.compileVersion = 28" >> gradle.properties
        echo "android.targetVersion = 28" >> gradle.properties
        echo "android.useAndroidX = false" >> gradle.properties
        echo "android.enableJetifier = false" >> gradle.properties  
           
    - name: Setup JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Gradle Wrapper Validation
      uses: gradle/actions/wrapper-validation@v4
    - name: Make gradlew executable
      run: chmod +x ./gradlew
    
    - uses: actions/cache@v4
      with:
        path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
            ${{ runner.os }}-gradle-
    
    - name: Build with Gradle
      run: ./gradlew assembleLegacyDebug
    
    - name: Build with Gradle (Unit tests)
      run: ./gradlew testLegacyRelease
    
    - name: Build with Gradle (lintVitalRelease)
      run: ./gradlew lintVitalLegacyRelease
    
    - name: Upload artifacts (debug apk)
      uses: actions/upload-artifact@v4
      with:
        name: app
        path: app/build/outputs/apk/production/release/app-legacy-release-unsigned.apk
        
    - name: Upload artifacts (lint results)
      if: success() || failure()
      uses: actions/upload-artifact@v4
      with:
        name: lint-results.html
        path: app/build/reports/lint-results-legacyRelease-fatal.html

    - name: Upload artifacts (test results)
      if: success() || failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: app/build/reports/tests/testLegacyReleaseUnitTest/
